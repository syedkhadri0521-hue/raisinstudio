<!-- ===================================================
     CLEAN LOGIN FORM
=================================================== -->

<section class="clean-login-page">

  <div class="clean-login-card">

    <!-- LOGO -->

    <a href="index.html" class="clean-logo">

      <h1>
        Rasin Studio
      </h1>

    </a>

    <!-- HEADING -->

    <div class="clean-login-heading">

      <h2>
        Welcome Back
      </h2>

      <p>
        Sign in to continue your luxury interior experience
      </p>

    </div>

    <!-- FORM -->

    <form class="clean-login-form">

      <!-- EMAIL -->

      <div class="clean-input-group">

        <label>
          Email Address
        </label>

        <input 
          type="email"
          placeholder="Enter your email"
        >

      </div>

      <!-- PASSWORD -->

      <div class="clean-input-group">

        <label>
          Password
        </label>

        <input 
          type="password"
          placeholder="Enter your password"
        >

      </div>

      <!-- OPTIONS -->

      <div class="clean-login-options">

        <label class="remember-option">

          <input type="checkbox">

          Remember me

        </label>

        <a href="#">
          Forgot Password?
        </a>

      </div>

      <!-- BUTTON -->

      <button type="submit" class="clean-login-btn">

        Sign In

      </button>

    </form>

    <!-- SWITCH -->

    <div class="clean-switch-auth">

      <p>
        Don’t have an account?
      </p>

      <a href="signup.html">
        Create Account
      </a>

    </div>

  </div>

</section>


  

  <!-- JS -->

  <script>
    lucide.createIcons();
  </script>

</body>

</html>
