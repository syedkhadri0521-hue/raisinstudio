<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Rasin Art & Home Decor Studio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

 

<script src="https://unpkg.com/lucide@latest"></script>




  <link rel="stylesheet" href="css/login.css">

</head>

<body>



<section class="login-section">

  <div class="login-card">

    <!-- TOP -->

    <div class="login-top">

      <!-- LOGO -->

      <div class="logo-wrapper">
      <a href="index.html" class="logo-link">
        <div class="logo-circle">
          R
        </div>
       </a>
        <h3>
          Rasin Art & Home Decor
        </h3>

      </div>

      <!-- DARK MODE -->
       <button class="rtl-btn">RTL</button>

      <button class="theme-toggle dark-mode-btn">

        <i class="fa-solid fa-moon"></i>

      </button>

    </div>

    <!-- TITLE -->

    <h2>
      Welcome Back
    </h2>

    <p>
      Login to continue
    </p>

    <!-- FORM -->

    <form class="login-form">

      <input 
        type="email" 
        placeholder="Email Address"
      >

      <input 
        type="password" 
        placeholder="Password"
      >

      <button type="submit" class="login-btn">
        Login
      </button>

    </form>

    <div class="options">
 
        <div class="remember">
 
          <input type="checkbox">
 
          <span>Remember Me</span>
 
        </div>
 
        <a href="#">Forgot Password?</a>
 
      </div>

    <!-- DIVIDER -->

    <div class="divider">
      <span>OR</span>
    </div>

    <!-- SOCIAL -->

    <div class="social-login">

      <button class="social-btn">

        <i class="fa-brands fa-google"></i>

        Google

      </button>

      <button class="social-btn">

        <i class="fa-brands fa-apple"></i>

        Apple

      </button>

      
    </div>
<div class="signup-txt">
   <p class="signup-text">
 
      Don't have an account?
 
      <a href="signup.html">Create Account</a>
 
    </p>
</div>
  </div>
  
  

</section>


  

  <!-- JS -->

  <script>
    lucide.createIcons();
  </script>
  <script src="js/main.js"></script>

<div class="navbar" style="display:none;"></div>

<button class="menu-toggle" style="display:none;"></button>

</body>

</html>
