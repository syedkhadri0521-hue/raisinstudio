<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Rasin Art & Home Decor Studio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

<!-- ===================================================
     SIGNUP PAGE
=================================================== -->

<!-- ===================================================
     CLEAN SIGNUP FORM
=================================================== -->

<!-- TITLE -->

<body>

<section class="login-section">

  <div class="login-card">

    <!-- TITLE -->

    <h2>
      Create Account
    </h2>

    <p>
      Sign up to continue
    </p>

    <div class="top-icons">
        <button class="rtl-btn">RTL</button>
      
      

    <button class="theme-toggle dark-mode-btn">

   <i class="fa-solid fa-moon"></i>

</button>
    </div>
  

    <!-- FORM -->

    <form class="login-form">

      <input type="text" placeholder="Full Name">

      <input type="email" placeholder="Email Address">

      <input type="password" placeholder="Create Password">

      <input type="password" placeholder="Confirm Password">

      <button type="submit" class="login-btn">
        Create Account
      </button>

    </form>

    <!-- OPTIONS -->

    <div class="options">

      <div class="remember">

        <input type="checkbox">

        <span>
          I agree to Terms & Conditions
        </span>

      </div>

    </div>

    <!-- DIVIDER -->

    <div class="divider">
      <span>OR</span>
    </div>

    <!-- SOCIAL -->

    <div class="social-login">

      <button class="social-btn">

        <i class="fa-brands fa-google"></i>

        Google

      </button>

      <button class="social-btn">

        <i class="fa-brands fa-apple"></i>

        Apple

      </button>

    </div>

    <!-- LOGIN TEXT -->

    <div class="signup-txt">

      <p class="signup-text">

        Already have an account?

        <a href="login.html">
          Login
        </a>

      </p>

    </div>

  </div>

</section>

 <script>
    lucide.createIcons();
  </script>
  <script src="js/main.js"></script>

<div class="navbar" style="display:none;"></div>

<button class="menu-toggle" style="display:none;"></button>
</body>
