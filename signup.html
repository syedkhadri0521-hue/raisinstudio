<!-- ===================================================
     SIGNUP PAGE
=================================================== -->

<!-- ===================================================
     CLEAN SIGNUP FORM
=================================================== -->

<section class="clean-signup-page">

  <div class="clean-signup-card">

    <!-- LOGO -->

    <a href="index.html" class="signup-logo">

      <h1>
        Rasin Studio
      </h1>

    </a>

    <!-- HEADING -->

    <div class="signup-heading">

      <h2>
        Create Account
      </h2>

      <p>
        Join Rasin Studio and begin your luxury experience
      </p>

    </div>

    <!-- FORM -->

    <form class="clean-signup-form">

      <!-- FULL NAME -->

      <div class="signup-input-group">

        <label>
          Full Name
        </label>

        <input 
          type="text"
          placeholder="Enter your full name"
        >

      </div>

      <!-- EMAIL -->

      <div class="signup-input-group">

        <label>
          Email Address
        </label>

        <input 
          type="email"
          placeholder="Enter your email"
        >

      </div>

      <!-- PASSWORD -->

      <div class="signup-input-group">

        <label>
          Password
        </label>

        <input 
          type="password"
          placeholder="Create password"
        >

      </div>

      <!-- CONFIRM PASSWORD -->

      <div class="signup-input-group">

        <label>
          Confirm Password
        </label>

        <input 
          type="password"
          placeholder="Confirm password"
        >

      </div>

      <!-- TERMS -->

      <div class="signup-options">

        <label class="terms-option">

          <input type="checkbox">

          I agree to Terms & Conditions

        </label>

      </div>

      <!-- BUTTON -->

      <button type="submit" class="signup-btn">

        Create Account

      </button>

    </form>

    <!-- LOGIN -->

    <div class="switch-login">

      <p>
        Already have an account?
      </p>

      <a href="login.html">
        Log In
      </a>

    </div>

  </div>

</section>
